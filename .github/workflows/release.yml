name: Build and Release Multi-Platform Desktop App

on:
  push:
    tags:
      - 'BetaV*' # 🎯 Triggers exactly on BetaV1.0.0, BetaV1.0.1, etc.
      - 'AlphaV*' # Added this just in case you tag it AlphaV1.0.0

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: QuantumCoBrain-Linux-x64.tar.gz
            asset_path: QuantumCoBrain-Linux-x64.tar.gz
          - os: macos-latest
            artifact_name: QuantumCoBrain-MacOS.zip
            asset_path: QuantumCoBrain-MacOS.zip
          - os: windows-latest
            artifact_name: QuantumCoBrain-Windows-x64.zip
            asset_path: QuantumCoBrain-Windows-x64.zip

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python Sandbox Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Linux System Headers
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev libgirepository1.0-dev libcairo2-dev pkg-config

    - name: Install Linux Python Matrix
      if: matrix.os == 'ubuntu-latest'
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Cross Platform Matrix
      if: matrix.os != 'ubuntu-latest'
      run: |
        python -m pip install --upgrade pip setuptools wheel
        grep -v "pysqlite3-binary" requirements.txt > requirements_cross.txt
        pip install -r requirements_cross.txt
        pip install pyinstaller

    - name: Compile Linux and Mac Binaries
      if: matrix.os != 'windows-latest'
      run: |
        python -m PyInstaller --clean --windowed --noconfirm --name="QuantumCoBrain" --icon="server/templates/logo.png" --add-data "server/templates/desktop.html:server/templates" server/desktop.py

    # 🍏 FIXED: Added vertical pipe '|' for clean multi-line shell evaluation
    - name: Compile Mac Binary (Intel Target)
      if: matrix.os == 'macos-latest'
      run: |
        python -m PyInstaller --clean --windowed --noconfirm --name="QuantumCoBrain-Intel" --target-arch x86_64 --icon="server/templates/logo.icns" --add-data 
"server/templates/desktop.html:server/templates" server/desktop.py

    - name: Compile Windows Exe
      if: matrix.os == 'windows-latest'
      run: |
        python -m PyInstaller --clean --noconsole --name="QuantumCoBrain" --icon="server/templates/logo.png" --add-data "server/templates/desktop.html;server/templates" server/desktop.py

    - name: Package Linux Assets
      if: matrix.os == 'ubuntu-latest'
      run: |
        tar -czf QuantumCoBrain-Linux-x64.tar.gz -C dist QuantumCoBrain/

    - name: Package Windows Assets
      if: matrix.os == 'windows-latest'
      run: |
        powershell Compress-Archive -Path dist\QuantumCoBrain\* -DestinationPath QuantumCoBrain-Windows-x64.zip

    - name: Package Mac Assets
      if: matrix.os == 'macos-latest' || matrix.os == 'macos-14'
      run: |
        cd dist && zip -r ../QuantumCoBrain-MacOS.zip QuantumCoBrain.app
        cd dist && zip -r ../QuantumCoBrain-MacOS-Intel.zip QuantumCoBrain-Intel.app

    - name: Upload Native OS Asset to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ matrix.asset_path }}
          QuantumCoBrain-MacOS-Intel.zip
        fail_on_unmatched_files: false
        name: Quantum Co-Brain Console ${{ github.ref_name }}
        body: |
          ## 🛰️ Quantum Co-Brain Control Desk - Live Multi-Platform Release
          
          Welcome to the official deployment stream of **${{ github.ref_name }}**.
          
          ### 🛠️ System Architecture Improvements
          * **Trademark Engine Branding:** Embedded native cross-platform icon sets across execution contexts.
          * **Central Cloud Tracking:** Migrated active state variable storage from isolated local SQLite files to a centralized cloud PostgreSQL database cluster.
          * **Unified Framework Overrides:** Implemented hybrid validation mechanics capable of authenticating raw browser cookie payloads alongside secure desktop headers natively.
          * **Zero-Latency Buffers:** Refactored the local telemetry snapshots panel to handle memory-buffered exports directly on native machines.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
