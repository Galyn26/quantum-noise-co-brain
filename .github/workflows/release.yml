name: Build and Release Multi-Platform Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: QuantumCoBrain-Linux-x64.tar.gz
            asset_path: QuantumCoBrain-Linux-x64.tar.gz
          - os: macos-latest
            artifact_name: QuantumCoBrain-MacOS.dmg
            asset_path: QuantumCoBrain-MacOS.dmg
          - os: windows-latest
            artifact_name: QuantumCoBrain-Windows-x64.zip
            asset_path: QuantumCoBrain-Windows-x64.zip

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python Sandbox Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: [Linux] Install System Graphical and SQLite Headers
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev libgirepository1.0-dev libcairo2-dev pkg-config

    - name: [Linux] Install Python Dependencies Matrix
      if: matrix.os == 'ubuntu-latest'
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pyinstaller

    - name: [Mac/Windows] Install Dependencies Without Linux Binary Patch
      if: matrix.os != 'ubuntu-latest'
      run: |
        python -m pip install --upgrade pip setuptools wheel
        # Remove the linux-specific binary requirement dynamically for Mac/Windows targets
        grep -v "pysqlite3-binary" requirements.txt > requirements_cross.txt
        pip install -r requirements_cross.txt
        pip install pyinstaller

    - name: [Linux/Mac] Compile Native Binary
      if: matrix.os != 'windows-latest'
      run: |
        python -m PyInstaller --clean --noconsole --name="QuantumCoBrain" \
          --collect-all "pysqlite3" \
          --collect-all "qtpy" \
          --collect-all "PyQt5" \
          --collect-all "PyQtWebEngine" \
          --add-data "server:server" \
          server/desktop.py

    - name: [Windows] Compile Native Exe (Single Line for PowerShell)
      if: matrix.os == 'windows-latest'
      run: python -m PyInstaller --clean --noconsole --name="QuantumCoBrain" --collect-all "pysqlite3" --collect-all "qtpy" --collect-all "PyQt5" --collect-all "PyQtWebEngine" --add-data "server;server" server/desktop.py

    - name: [Linux] Package Tarball
      if: matrix.os == 'ubuntu-latest'
      run: |
        tar -czf QuantumCoBrain-Linux-x64.tar.gz -C dist QuantumCoBrain/

    - name: [Windows] Package Zip Archive
      if: matrix.os == 'windows-latest'
      run: |
        powershell Compress-Archive -Path dist\QuantumCoBrain\* -DestinationPath QuantumCoBrain-Windows-x64.zip

    - name: [macOS] Package DMG Installer
      if: matrix.os == 'macos-latest'
      run: |
        zip -r QuantumCoBrain-MacOS.dmg dist/QuantumCoBrain/

    - name: Upload Native OS Asset to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.asset_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
