name: Build and Release Multi-Platform Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Spin up all three operating systems in parallel
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: QuantumCoBrain-Linux-x64.tar.gz
            asset_path: QuantumCoBrain-Linux-x64.tar.gz
          - os: macos-latest
            artifact_name: QuantumCoBrain-MacOS.dmg
            asset_path: QuantumCoBrain-MacOS.dmg
          - os: windows-latest
            artifact_name: QuantumCoBrain-Windows-x64.zip
            asset_path: QuantumCoBrain-Windows-x64.zip

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python Sandbox Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # --- PLATFORM SPECIFIC DEPENDENCY SETUPS ---
    - name: [Linux] Install System Graphical & SQLite Headers
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev libgirepository1.0-dev libcairo2-dev pkg-config

    - name: Install Python Dependencies Matrix
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pyinstaller

    # --- NATIVE COMPILATION STEP ---
    - name: Compile App Binary via PyInstaller
      shell: bash
      run: |
        # On Windows, path separators use backslashes for data inclusion
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          DATA_SEP=";"
        else
          DATA_SEP=":"
        fi
        
        python -m PyInstaller --clean --noconsole --name="QuantumCoBrain" \
          --collect-all "pysqlite3" \
          --collect-all "qtpy" \
          --collect-all "PyQt5" \
          --collect-all "PyQtWebEngine" \
          --add-data "server${DATA_SEP}server" \
          server/desktop.py

    # --- COMPRESSION & PACKAGING STEP ---
    - name: [Linux] Package Tarball
      if: matrix.os == 'ubuntu-latest'
      run: tar -czf QuantumCoBrain-Linux-x64.tar.gz -C dist QuantumCoBrain/

    - name: [Windows] Package Zip Archive
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: Compress-Archive -Path dist\QuantumCoBrain\* -DestinationPath QuantumCoBrain-Windows-x64.zip

    - name: [macOS] Package DMG Installer
      if: matrix.os == 'macos-latest'
      run: |
        pip install dmgbuild
        # Quick fallback zip compression if full DMG generation tools aren't natively configured
        zip -r QuantumCoBrain-MacOS.dmg dist/QuantumCoBrain/

    # --- AUTOMATIC RELEASE LAYER ---
    - name: Upload Native OS Asset to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.asset_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
